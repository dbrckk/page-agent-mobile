<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Page Agent + Groq</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-2: #2563eb;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 14px;
      margin: 14px 0 8px;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .primary {
      background: var(--primary);
      color: white;
    }

    .primary:hover {
      background: var(--primary-2);
    }

    .secondary {
      background: #1e293b;
      color: white;
    }

    .danger {
      background: var(--danger);
      color: white;
    }

    #status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      white-space: pre-wrap;
      font-size: 14px;
      color: var(--text);
      min-height: 64px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Page Agent + Groq</h1>
      <p>
        Interface mobile simple pour lancer Page Agent dans la page avec Groq.
      </p>

      <div class="row">
        <div>
          <label for="apiKey">Clé API Groq</label>
          <input id="apiKey" type="text" placeholder="gsk_..." />
        </div>

        <div>
          <label for="model">Modèle</label>
          <select id="model">
            <option value="openai/gpt-oss-20b" selected>openai/gpt-oss-20b</option>
            <option value="openai/gpt-oss-120b">openai/gpt-oss-120b</option>
            <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
            <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
          </select>
        </div>

        <div>
          <label for="task">Instruction</label>
          <textarea id="task" placeholder="Exemple : Analyse cette page, liste les boutons visibles et résume le contenu en 5 points."></textarea>
        </div>
      </div>

      <div class="buttons">
        <button class="primary" id="runBtn">Lancer</button>
        <button class="secondary" id="demoBtn">Exemple</button>
        <button class="secondary" id="saveBtn">Sauver la clé</button>
        <button class="danger" id="clearBtn">Effacer la clé</button>
      </div>

      <div id="status">Prêt.</div>

      <div class="small">
        Conseil : utilise d’abord des tâches simples sur une seule page.
      </div>
    </div>
  </div>

  <script>
    const apiKeyEl = document.getElementById("apiKey");
    const modelEl = document.getElementById("model");
    const taskEl = document.getElementById("task");
    const runBtn = document.getElementById("runBtn");
    const demoBtn = document.getElementById("demoBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");

    const STORAGE_KEY = "groq_api_key_page_agent";

    const savedKey = localStorage.getItem(STORAGE_KEY);
    if (savedKey) {
      apiKeyEl.value = savedKey;
    }

    demoBtn.addEventListener("click", () => {
      taskEl.value = "Analyse cette page, liste les champs et boutons importants, puis explique en 5 points ce que tu peux faire ici.";
      statusEl.textContent = "Exemple chargé.";
    });

    saveBtn.addEventListener("click", () => {
      const apiKey = apiKeyEl.value.trim();

      if (!apiKey) {
        statusEl.textContent = "Aucune clé à sauvegarder.";
        return;
      }

      localStorage.setItem(STORAGE_KEY, apiKey);
      statusEl.textContent = "Clé sauvegardée dans le navigateur.";
    });

    clearBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      apiKeyEl.value = "";
      statusEl.textContent = "Clé supprimée du navigateur.";
    });

    async function loadPageAgent() {
      statusEl.textContent = "Chargement de Page Agent...";

      if (window.PageAgent) {
        return window.PageAgent;
      }

      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/page-agent@1.5.7/dist/iife/page-agent.demo.js";
      script.crossOrigin = "anonymous";

      const loaded = new Promise((resolve, reject) => {
        script.onload = () => resolve();
        script.onerror = () => reject(new Error("Impossible de charger Page Agent depuis le CDN."));
      });

      document.head.appendChild(script);
      await loaded;

      if (!window.PageAgent) {
        throw new Error("PageAgent est introuvable après chargement.");
      }

      return window.PageAgent;
    }

    runBtn.addEventListener("click", async () => {
      const apiKey = apiKeyEl.value.trim();
      const model = modelEl.value;
      const task = taskEl.value.trim();

      if (!apiKey) {
        statusEl.textContent = "Ajoute ta clé Groq.";
        return;
      }

      if (!task) {
        statusEl.textContent = "Écris une instruction.";
        return;
      }

      runBtn.disabled = true;
      statusEl.textContent = "Initialisation...";

      try {
        const PageAgentClass = await loadPageAgent();

        statusEl.textContent = "Création de l'agent...";

        const agent = new PageAgentClass({
          model,
          baseURL: "https://api.groq.com/openai/v1",
          apiKey,
          language: "fr-FR",
        });

        statusEl.textContent = "Exécution en cours...";

        const result = await agent.execute(task);

        if (typeof result === "string") {
          statusEl.textContent = result;
        } else {
          statusEl.textContent = JSON.stringify(result, null, 2);
        }
      } catch (err) {
        statusEl.textContent = "Erreur : " + (err?.message || String(err));
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
  </html>
